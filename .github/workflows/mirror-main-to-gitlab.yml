name: Mirror Main to GitLab

on:
  push:

permissions:
  contents: read

jobs:
  mirror-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build and push evaluation snapshot
        id: snapshot
        env:
          GITLAB_MIRROR_URL: ${{ secrets.GITLAB_MIRROR_URL }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "[mirror] step: save source commit message"
          source_commit_message_file="$(mktemp)"
          git log -1 --pretty=%B > "$source_commit_message_file"
          echo "[mirror] done: save source commit message"

          echo "[mirror] step: build evaluation tree"
          bash scripts/export-eval-tree.sh
          echo "[mirror] done: build evaluation tree"

          echo "[mirror] step: write evaluation tree"
          tree_sha="$(git write-tree)"
          echo "[mirror] done: write evaluation tree $tree_sha"

          if [ -z "$GITLAB_MIRROR_URL" ]; then
            echo "::error::Missing GITLAB_MIRROR_URL secret"
            exit 1
          fi

          echo "[mirror] step: add GitLab remote"
          git remote add gitlab "$GITLAB_MIRROR_URL"
          echo "[mirror] done: add GitLab remote"

          echo "[mirror] step: create one-shot snapshot commit"
          commit_sha="$(git commit-tree "$tree_sha" -F "$source_commit_message_file")"
          echo "[mirror] done: create one-shot snapshot commit $commit_sha"

          echo "[mirror] step: push snapshot commit to GitLab main"
          git push --force gitlab "$commit_sha:refs/heads/main"
          echo "[mirror] done: push snapshot commit to GitLab main"
