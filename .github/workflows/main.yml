name: AutoTest

on: [pull_request]

env:
  CARGO_TERM_COLOR: always
  rust_toolchain: nightly

jobs:
  boot-test:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ga1axy0/os-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Tool versions
        run: |
          qemu-system-riscv64 --version
          rustc --version

      - name: Boot kernel
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "$(pwd)"

          BASE_IMG_PATH=/opt/xxos/sdcard-rv.img
          if [ ! -f "$BASE_IMG_PATH" ] && [ -f /opt/xxos/base.img ]; then
            BASE_IMG_PATH=/opt/xxos/base.img
          fi
          if [ ! -f "$BASE_IMG_PATH" ] && [ -f base.img.xz ]; then
            xz -d -k -f base.img.xz
            BASE_IMG_PATH="$(pwd)/base.img"
          fi
          if [ ! -f "$BASE_IMG_PATH" ]; then
            echo "::error::Base ext4 image not found"
            exit 1
          fi

          make disk.img
          EXTRA_BLK_ARGS="-drive file=$(pwd)/disk.img,if=none,format=raw,id=x1 -device virtio-blk-device,drive=x1,bus=virtio-mmio-bus.1"
          ls -lh "$BASE_IMG_PATH" disk.img

          make -C os build OFFLINE=1 LOG=INFO FS_IMG="$BASE_IMG_PATH" SMP=4

          # run-inner 一般不会主动退出，所以 timeout；timeout 超时会返回非0，所以加 || true
          timeout 180s make -C os run-inner OFFLINE=1 FS_IMG="$BASE_IMG_PATH" SMP=4 QEMU_EXTRA_ARGS="$EXTRA_BLK_ARGS" 2>&1 | tee boot.log || true

          echo "=== boot.log tail ==="
          tail -n 200 boot.log

      - name: Check boot marker
        run: |
          if grep -F "[kernel] Panicked" boot.log >/dev/null; then
            echo "::error::Kernel panicked during boot"
            echo "## ❌ Kernel Panic Detected" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if ! grep -F "mounted extra ext4 at /mnt from /dev/vda" boot.log >/dev/null; then
            echo "::error::Dual-disk startup marker missing"
            echo "## ❌ New dual-disk startup path was not exercised" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          if grep -F "[kernel] Hello, world!" boot.log >/dev/null; then
            echo "::notice::Kernel boot successful"
            echo "## ✅ Kernel Boot Successful" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "::error::Kernel boot FAILED"
          echo "## ❌ Kernel Boot Failed" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
          retention-days: 7
