name: AutoTest

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  rust_toolchain: nightly

jobs:
  boot-test:
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/ga1axy0/os-ci:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true

      - name: Tool versions
        run: |
          qemu-system-riscv64 --version
          rustc --version

      - name: Boot kernel
        shell: bash
        run: |
          set -euxo pipefail
          git config --global --add safe.directory "$(pwd)"
          BASE_IMG_PATH=/opt/xxos/base.img
          if [ ! -f "$BASE_IMG_PATH" ]; then
            echo "Container base image missing, falling back to repo base.img.xz"
            test -f base.img.xz
            xz -d -k -f base.img.xz
            BASE_IMG_PATH=../base.img
          fi

          # make run 一般不会退出，所以 timeout；timeout 超时会返回非0，所以加 || true
          timeout 90s bash -lc "cd os && make run BASE_IMG=$BASE_IMG_PATH" 2>&1 | tee boot.log || true

          echo "=== boot.log tail ==="
          tail -n 200 boot.log

      - name: Check boot marker
        run: |
          if grep -F "[kernel] Hello, world!" boot.log >/dev/null; then
            echo "::notice::Kernel boot successful"
            echo "## ✅ Kernel Boot Successful" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          echo "::error::Kernel boot FAILED"
          echo "## ❌ Kernel Boot Failed" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log
          retention-days: 7
